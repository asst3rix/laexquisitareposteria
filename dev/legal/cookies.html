POLÍTICA DE COOKIES1. 

¿QUÉ SON LAS COOKIES?

Una cookie es un fichero que se descarga en su ordenador al acceder a determinadas páginas web. Las cookies permiten a una página web, entre otras cosas, almacenar y recuperar información sobre los hábitos de navegación de un usuario o de su equipo y, dependiendo de la información que contengan y de la forma en que utilice su equipo, pueden utilizarse para reconocer al usuario.

2. ¿QUÉ TIPOS DE COOKIES UTILIZA ESTE SITIO WEB?

Cookies técnicas: Son aquellas que permiten al usuario la navegación a través de una página web y la utilización de las diferentes opciones o servicios que en ella existan como, por ejemplo, controlar el tráfico, identificar la sesión o realizar el proceso de compra de un pedido. (Estas no requieren consentimiento).

Cookies de personalización: Permiten al usuario acceder al servicio con algunas características de carácter general predefinidas (como el idioma o la región desde donde accede).

Cookies de análisis: Son aquellas que, tratadas por nosotros o por terceros (como Google Analytics), nos permiten cuantificar el número de usuarios y realizar la medición y análisis estadístico de la utilización que hacen los usuarios del servicio ofertado.

Cookies de publicidad comportamental: Almacenan información del comportamiento de los usuarios obtenida a través de la observación continuada de sus hábitos de navegación, lo que permite desarrollar un perfil específico para mostrar publicidad en función del mismo.

4. GESTIÓN Y REVOCACIÓN DEL CONSENTIMIENTO

El usuario puede, en cualquier momento, permitir, bloquear o eliminar las cookies instaladas en su equipo mediante la configuración de las opciones del navegador instalado en su ordenador:

Chrome: Configuración -> Privacidad y seguridad -> Cookies y otros datos de sitios.

Safari: Preferencias -> Privacidad -> Cookies y datos de sitios web.

Firefox: Opciones -> Privacidad y Seguridad -> Cookies y datos del sitio.

Asimismo, nuestro sitio web dispone de un panel de configuración accesible desde el banner de cookies inicial donde podrá aceptar o rechazar las cookies por categorías.

5. TRANSFERENCIAS INTERNACIONALES DE DATOS

En el caso de utilizar cookies de terceros (como Google o Facebook), los datos pueden ser transferidos a servidores fuera del Espacio Económico Europeo (EE. UU.). Estas empresas suelen estar adheridas al "Data Privacy Framework" que garantiza un nivel de protección adecuado.
